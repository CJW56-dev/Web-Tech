<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | EduStream</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">EduStream.</a>
        <ul class="nav-links">
            <li><button onclick="toggleDarkMode()" style="background:none; border:none; font-size:1.4rem; cursor:pointer;" id="theme-icon">🌙</button></li>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html" style="color: var(--primary);">Courses</a></li>
            <li><a href="bookstore.html">Bookstore</a></li>
            <li class="auth-required" style="display: none;"><a href="#" id="dynamic-dash-link">Dashboard</a></li>
            <li class="auth-required" style="display: none;"><a href="forum.html">Community</a></li>
            <li><a href="portal.html" id="nav-auth-btn" class="btn btn-primary">Sign In</a></li>
        </ul>
    </nav>
    <main>
        <header class="hero"><h1 style="font-size: 3rem; font-weight: 900;">Course <span style="color:var(--primary)">Content</span></h1></header>
        <section class="container">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2.5rem;">
                <div class="card animate-fade-in">
                    <span class="badge badge-primary">MODULE 01</span>
                    <h3 style="margin: 1rem 0 1.5rem; font-size: 1.4rem;">HTML & CSS Fundamentals</h3>
                    <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; margin-bottom: 1.5rem;"><iframe src="https://www.youtube.com/embed/mU6anWqZJcc?rel=0&modestbranding=1" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen></iframe></div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-primary" style="flex: 1; padding: 0.8rem;" onclick="openQuiz()">Quiz</button>
                        <button class="btn btn-secondary" style="flex: 1; padding: 0.8rem;" onclick="openNotepad('module_01')">📝 Notes</button>
                        <button class="btn btn-outline" style="flex: 1; padding: 0.8rem;" onclick="simulateDownload('Module_01_Notes')">PDF</button>
                    </div>
                </div>
                <div class="card animate-fade-in delay-1">
                    <span class="badge badge-secondary">MODULE 02</span>
                    <h3 style="margin: 1rem 0 1.5rem; font-size: 1.4rem;">JavaScript Logic & APIs</h3>
                    <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; margin-bottom: 1.5rem;"><iframe src="https://www.youtube.com/embed/W6NZfCO5SIk?rel=0&modestbranding=1" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen></iframe></div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-primary" style="flex: 1; padding: 0.8rem;" onclick="openQuiz()">Quiz</button>
                        <button class="btn btn-secondary" style="flex: 1; padding: 0.8rem;" onclick="openNotepad('module_02')">📝 Notes</button>
                        <button class="btn btn-outline" style="flex: 1; padding: 0.8rem;" onclick="simulateDownload('Module_02_Notes')">PDF</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="quiz-modal" class="modal-overlay"><div class="card" style="width: 90%; max-width: 600px;"><div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;"><h3 style="margin: 0; font-size: 1.5rem; color: var(--primary);">Knowledge Check</h3><span id="quiz-progress" class="badge badge-primary">1/2</span></div><h4 id="question-text" style="font-size: 1.25rem; margin-bottom: 2rem;">Loading...</h4><div id="options-container"></div><div style="display: flex; justify-content: space-between; margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;"><button class="btn btn-outline" onclick="closeQuiz()">Cancel</button><button class="btn btn-primary" id="next-btn" onclick="nxtQ()">Next</button></div></div></div>
    <div id="notepad-modal" class="modal-overlay"><div class="card" style="width: 90%; max-width: 700px;"><div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;"><h3 style="margin: 0; font-size: 1.5rem;">Digital <span style="color: var(--secondary)">Notepad</span></h3><span class="badge badge-secondary">Auto-saves</span></div><textarea id="notepad-text" placeholder="Type your notes here..." style="width: 100%; height: 250px; resize: vertical; margin-bottom:1.5rem;"></textarea><div style="display: flex; justify-content: flex-end; gap: 1rem;"><button class="btn btn-outline" onclick="closeNotepad()">Close</button><button class="btn btn-secondary" onclick="saveNotepad()">Save Notes</button></div></div></div>
    <footer style="background: #0f172a; color: #94a3b8; padding: 4rem 10% 2rem; margin-top: auto;"><div style="max-width: 1200px; margin: 0 auto; text-align: center;"><a href="index.html" class="logo" style="color: white; -webkit-text-fill-color: white;">EduStream.</a></div></footer>
    <script src="app.js"></script>
</body>
</html>
